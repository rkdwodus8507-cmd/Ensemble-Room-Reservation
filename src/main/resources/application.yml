spring:
  application:
    name: ensemble-room-reservation

  datasource:
    url: jdbc:postgresql://localhost:5432/ensemble
    username: ${DB_USERNAME:ensemble}
    password: ${DB_PASSWORD:ensemble}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
